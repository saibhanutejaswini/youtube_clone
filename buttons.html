<!DOCTYPE html>
<html>
    <head>
        <style>
    .subscribe-button{
    background-color:red;
    color : white;
    border : none;
   padding : 15px;
    cursor : pointer;
    margin-right : 8px;
    border-width : 1px;
transition: background-color 0.15s,
    color 0.15s;}
    .subscribe-button:hover{
        opacity:0.7;
    }
    .subscribe-button:active{
        opacity:0.4;
    }
    .Tweet-button{
         background-color:rgb(29, 155, 240);
        
    color : white;
    border : none;
   padding : 15px;
    cursor : pointer;
    margin-right : 8px;
    border-width : 1px;
    border-radius : 20px;
    transition: background-color 0.15s,
    color 0.15s;
        }
        .Tweet-button:hover{
        box-shadow : 2px 2px 4px rgba(0,0,0,0.2);
    }
        .Tweet-button:hover{
        opacity:0.7;
    }
    .Tweet-button:active{
        opacity:0.4;
    }
    .join-button{
        background-color:white;
    color :blue;
    border-color : blue;
    padding : 15px;
    cursor : pointer;
    margin-right : 8px;
    border-width : 1px;
    border-radius : 20px;
    transition: background-color 0.15s,
    color 0.15s;
    }
    .join-button:hover{
        opacity:0.7;
    }
    .join-button:active{
        opacity:0.4;
    }
    
</style>

    </head>
    <body>
        <button class="subscribe-button">
    SUBSCRIBE
    </button>
<button class="join-button">JOIN</button>
<button class="Tweet-button">Tweet</button> 
    </body>
</html>
